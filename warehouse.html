<!DOCTYPE html>
<html lang="fr">
  <head>

    <link rel="stylesheet" href="warehouse.css" />
    <link

      href="https://fonts.googleapis.com/css?family=Raleway"

    <link

    <nav class="sidenav" id="mySidenav" aria-label="Menu latéral">

      <a href="index.html" onclick="closeNav()"

          <u>RECEVOIR VOTRE ZAKAT AL FITR</u>

    <!-- Header -->
    <header class="bgimg-1 w3-display-container" id="home">

      <div class="container" id="myNavbar">
        <div class="topnav">
          <!-- Desktop links -->
          <div class="w3-right w3-hide-small">
            <a href="index.html"><i class="fa fa-home"></i> ACCUEIL</a>
            <a href="warehouse.html" class="active"
              ><i class="fa fa-warehouse"></i> DÉPÔTS</a
            >
            <a href="measures.html"

          <a
            href="javascript:void(0)"
            class="w3-bar-item w3-button w3-right w3-hide-large w3-hide-medium"
            id="openbtn"
            onclick="openNav()"
            aria-label="Ouvrir le menu"

        </div>

        <!-- Logo -->
        <a href="index.html" id="logo" aria-label="Accueil Zakat Al Fitr"></a>

      <div class="w3-container" style="padding: 200px 16px" id="table">
        <div class="container-search">
          <div class="input-wrapper">
            <i class="fa fa-search" aria-hidden="true"></i>

            />

          <br />
          <div id="match-list"></div>

      <footer class="site-footer">
        <div class="footer-icons">
          <a
            href="https://www.facebook.com/profile.php?id=100090586256162"
            target="_blank"
            ><i class="fa-brands fa-facebook"></i

          <a href="https://www.instagram.com/" target="_blank"
